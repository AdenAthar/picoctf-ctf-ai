<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTF-AI — Capture The Flag Solver</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2eb;
    --surface: #eeeae0;
    --surface2: #e6e2d8;
    --border: #d4cfc4;
    --green: #1D9E75;
    --green-dim: #0F6E56;
    --green-glow: rgba(29,158,117,0.12);
    --cyan: #1D9E75;
    --red: #cc3344;
    --text: #1a1a18;
    --text-dim: #7a7670;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Rajdhani', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--display);
    min-height: 100vh;
    overflow-x: hidden;
  }



  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* header */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    flex-direction: column;
  }

  .logo-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--green);
    letter-spacing: 3px;
    margin-bottom: 4px;
    opacity: 0.7;
  }

  h1 {
    font-family: var(--display);
    font-size: 2.8rem;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
  }

  h1 span { color: var(--green); }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--green);
    background: var(--green-glow);
    border: 1px solid rgba(29,158,117,0.25);
    padding: 6px 12px;
    border-radius: 2px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* category tabs */
  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 1.5rem;
    background: var(--surface);
    padding: 3px;
    border: 1px solid var(--border);
    border-radius: 3px;
    flex-wrap: wrap;
  }

  .tab {
    flex: 1;
    min-width: 100px;
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    background: transparent;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    text-align: center;
  }

  .tab:hover { color: var(--green); background: var(--green-glow); }
  .tab.active {
    color: #fff;
    background: var(--green);
    font-weight: 600;
  }

  /* main input area */
  .input-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 1rem;
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .panel-header .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }

  textarea {
    width: 100%;
    min-height: 130px;
    background: transparent;
    border: none;
    outline: none;
    padding: 14px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    resize: vertical;
    line-height: 1.6;
  }

  textarea::placeholder { color: var(--text-dim); }

  /* auto-detect strip */
  .detect-strip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    min-height: 36px;
  }

  .detect-label { color: var(--green); }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    background: rgba(29,158,117,0.1);
    border: 1px solid rgba(29,158,117,0.3);
    border-radius: 2px;
    color: var(--green);
    font-size: 10px;
    letter-spacing: 1px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }

  /* solve button */
  .solve-btn {
    width: 100%;
    padding: 14px;
    background: var(--green);
    border: none;
    border-radius: 3px;
    font-family: var(--display);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 3px;
    color: #fff;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .solve-btn:hover { background: var(--green-dim); transform: translateY(-1px); }
  .solve-btn:active { transform: translateY(0); }
  .solve-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .solve-btn .btn-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  /* output panel */
  .output-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    display: none;
    animation: slideUp 0.3s ease;
  }

  .output-panel.visible { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .output-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--green);
    letter-spacing: 2px;
  }

  .copy-btn {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
  }

  .copy-btn:hover { color: var(--green); border-color: var(--green); }

  .output-body {
    padding: 16px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* flag highlight */
  .flag-highlight {
    display: inline-block;
    background: rgba(29,158,117,0.1);
    border: 1px solid rgba(29,158,117,0.4);
    color: var(--green);
    padding: 6px 12px;
    border-radius: 2px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    margin: 8px 0;
  }

  /* history */
  .history-section {
    margin-top: 2rem;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .history-list { display: flex; flex-direction: column; gap: 6px; }

  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .history-item:hover { border-color: var(--green); }

  .hist-type {
    color: var(--cyan);
    min-width: 80px;
    letter-spacing: 1px;
  }

  .hist-input {
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .hist-flag { color: var(--green); margin-left: auto; flex-shrink: 0; }

  /* loading spinner */
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(8,11,15,0.3);
    border-top-color: var(--bg);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* error state */
  .error-msg {
    color: var(--red);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 14px;
  }

  /* file upload */
  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: var(--surface);
  }
  .upload-zone:hover, .upload-zone.drag-over { border-color: var(--green); background: var(--green-glow); }
  .upload-zone input[type=file] { display: none; }
  .upload-icon { font-family: var(--mono); font-size: 20px; color: var(--green); flex-shrink: 0; }
  .upload-text { flex: 1; }
  .upload-text .up-title { font-family: var(--mono); font-size: 11px; color: var(--text); letter-spacing: 1px; }
  .upload-text .up-sub { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .file-badge {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 10px;
    background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.25);
    border-radius: 2px; font-family: var(--mono); font-size: 10px; color: var(--green); letter-spacing: 1px;
  }
  .file-badge .clear-file { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 13px; padding: 0; line-height: 1; }
  .file-badge .clear-file:hover { color: var(--red); }
  .file-preview {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 3px;
    padding: 10px 14px; margin-bottom: 1rem; font-family: var(--mono); font-size: 11px;
    color: var(--text-dim); display: none;
  }
  .file-preview.visible { display: block; }
  .file-preview .preview-label { color: var(--cyan); margin-bottom: 6px; letter-spacing: 1px; }
  .file-preview img { max-width: 100%; max-height: 180px; border-radius: 2px; display: block; margin-top: 6px; }
  .file-preview .hex-dump { color: var(--green); line-height: 1.8; word-break: break-all; }


</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <span class="logo-tag">// PICOCTF ASSISTANT</span>
      <h1>CTF<span>-AI</span></h1>
    </div>
    <div class="status-pill">
      <span class="status-dot"></span>
      SYSTEM ONLINE
    </div>
  </header>

  <!-- category tabs -->
  <div class="tabs">
    <button class="tab active" data-cat="auto">AUTO-DETECT</button>
    <button class="tab" data-cat="crypto">CRYPTO</button>
    <button class="tab" data-cat="forensics">FORENSICS</button>
    <button class="tab" data-cat="web">WEB EXPLOIT</button>
    <button class="tab" data-cat="general">GENERAL</button>
    <button class="tab" data-cat="reverse">REVERSING</button>
  </div>

  <!-- file upload -->
  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept="*/*">
    <div class="upload-icon">[+]</div>
    <div class="upload-text">
      <div class="up-title">DROP FILE OR CLICK TO UPLOAD</div>
      <div class="up-sub">txt &middot; png &middot; jpg &middot; gif &middot; bin &middot; any file &mdash; auto-analyzed</div>
    </div>
    <div id="fileBadge" style="display:none;" class="file-badge">
      <span id="fileName">file.txt</span>
      <button class="clear-file" onclick="clearFile(event)">&#x2715;</button>
    </div>
  </div>

  <div class="file-preview" id="filePreview">
    <div class="preview-label">FILE PREVIEW</div>
    <div id="previewContent"></div>
  </div>

  <!-- input -->
  <div class="input-panel">
    <div class="panel-header">
      <span class="dot dot-r"></span>
      <span class="dot dot-y"></span>
      <span class="dot dot-g"></span>
      <span style="margin-left:6px;" id="panelFilename">challenge_input.txt</span>
    </div>
    <textarea id="challengeInput" placeholder="Paste the CTF challenge description, encoded string, or ciphertext here...

Examples:
  picoCTF{...} encoded flag
  Base64/hex/binary encoded data
  Challenge description text
  Source code to analyze"></textarea>
    <div class="detect-strip" id="detectStrip">
      <span class="detect-label">DETECTED:</span>
      <span id="detectedType">waiting for input...</span>
    </div>
  </div>

  <button class="solve-btn" id="solveBtn" onclick="solve()">
    <div class="btn-inner">
      <span>ANALYZE &amp; SOLVE</span>
    </div>
  </button>

  <!-- output -->
  <div class="output-panel" id="outputPanel">
    <div class="output-header">
      <span class="output-title">// ANALYSIS OUTPUT</span>
      <button class="copy-btn" onclick="copyOutput()">COPY</button>
    </div>
    <div class="output-body" id="outputBody"></div>
  </div>

  <!-- history -->
  <div class="history-section" id="historySection" style="display:none;">
    <div class="section-label">SOLVE HISTORY</div>
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<script>
  let selectedCat = 'auto';
  let history = [];
  let uploadedFile = null;
  let uploadedFileType = null; // 'text' | 'image' | 'binary'
  let uploadedFileData = null; // base64 string for images, text string for text, hex string for binary

  // ---- FILE UPLOAD ----
  const fileInput = document.getElementById('fileInput');
  const uploadZone = document.getElementById('uploadZone');

  fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    uploadedFile = file;
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileBadge').style.display = 'flex';
    document.getElementById('panelFilename').textContent = file.name;

    const ext = file.name.split('.').pop().toLowerCase();
    const imageExts = ['png','jpg','jpeg','gif','bmp','webp','tiff'];
    const preview = document.getElementById('filePreview');
    const previewContent = document.getElementById('previewContent');
    preview.classList.add('visible');

    if (imageExts.includes(ext) || file.type.startsWith('image/')) {
      uploadedFileType = 'image';
      const reader = new FileReader();
      reader.onload = e => {
        uploadedFileData = e.target.result.split(',')[1];
        previewContent.innerHTML = `<img src="${e.target.result}" alt="uploaded">`;
        document.getElementById('challengeInput').value = '[Image file loaded — will be sent to AI for visual analysis]';
        triggerDetect('[Image file loaded — will be sent to AI for visual analysis]');
      };
      reader.readAsDataURL(file);
    } else {
      // Try reading as text first — covers .bin, .txt, and any ASCII file
      const textReader = new FileReader();
      textReader.onload = e => {
        const content = e.target.result;
        const isAscii = /^[\x00-\x7F]*$/.test(content.slice(0, 1000));
        if (isAscii && content.length > 0) {
          uploadedFileType = 'text';
          uploadedFileData = content;
          const preview300 = content.slice(0, 300);
          previewContent.innerHTML = `<div class="hex-dump">${escHtml(preview300)}${content.length > 300 ? '\n...' : ''}</div>`;
          // Don't overwrite textarea — let user keep their challenge description
          // Only populate if textarea is empty
          const ta = document.getElementById('challengeInput');
          if (!ta.value.trim()) {
            ta.value = content.slice(0, 4000);
          }
          triggerDetect(content);
        } else {
          // True binary — hex dump it
          uploadedFileType = 'binary';
          const binReader = new FileReader();
          binReader.onload = e2 => {
            const bytes = new Uint8Array(e2.target.result);
            const hexFull = Array.from(bytes.slice(0, 2048)).map(b => b.toString(16).padStart(2,'0')).join(' ');
            uploadedFileData = hexFull;
            const hexPreview = Array.from(bytes.slice(0, 96)).map(b => b.toString(16).padStart(2,'0')).join(' ');
            previewContent.innerHTML = `<div class="hex-dump">${escHtml(hexPreview)}${bytes.length > 96 ? '\n...' : ''}</div>`;
            const ta = document.getElementById('challengeInput');
            if (!ta.value.trim()) ta.value = hexFull;
            triggerDetect(hexFull);
          };
          binReader.readAsArrayBuffer(file);
        }
      };
      textReader.readAsText(file);
    }
  }

  function clearFile(e) {
    e.stopPropagation();
    uploadedFile = null; uploadedFileType = null; uploadedFileData = null;
    document.getElementById('fileBadge').style.display = 'none';
    document.getElementById('filePreview').classList.remove('visible');
    document.getElementById('panelFilename').textContent = 'challenge_input.txt';
    document.getElementById('challengeInput').value = '';
    document.getElementById('detectedType').textContent = 'waiting for input...';
    fileInput.value = '';
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function escHtml2(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function triggerDetect(val) {
    const detected = detectType(val);
    document.getElementById('detectedType').innerHTML = detected.map(d => `<span class="badge">${d}</span>`).join(' ');
  }

  // tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      selectedCat = tab.dataset.cat;
    });
  });

  // auto-detect on input
  const input = document.getElementById('challengeInput');
  input.addEventListener('input', () => {
    const val = input.value.trim();
    const detected = detectType(val);
    const strip = document.getElementById('detectedType');
    if (val.length < 3) {
      strip.textContent = 'waiting for input...';
      strip.className = '';
      return;
    }
    strip.innerHTML = detected.map(d => `<span class="badge">${d}</span>`).join(' ');
  });

  function detectType(text) {
    const types = [];
    if (/^[A-Za-z0-9+/]+=*$/.test(text) && text.length % 4 === 0 && text.length > 8) types.push('BASE64');
    if (/^[0-9a-fA-F]+$/.test(text) && text.length % 2 === 0) types.push('HEX');
    if (/^[01\s]+$/.test(text) && text.replace(/\s/g,'').length > 8) types.push('BINARY');
    if (/picoCTF\{/.test(text)) types.push('FLAG FORMAT');
    if (/[^\x00-\x7F]/.test(text)) types.push('NON-ASCII');
    if (text.split('\n').length > 3 || text.includes('decrypt') || text.includes('cipher')) types.push('CHALLENGE DESC');
    if (/^\d+$/.test(text)) types.push('NUMERIC');
    if (text.includes('-----BEGIN') || text.includes('n =') || text.includes('e =')) types.push('RSA/PEM');
    if (/<[a-z][\s\S]*>/i.test(text)) types.push('HTML/XML');
    if (types.length === 0) types.push('UNKNOWN — AI WILL ANALYZE');
    return types;
  }

  function buildPrompt(challengeText, category) {
    const catInstructions = {
      auto: 'Automatically identify the encoding, cipher, or vulnerability type. Try multiple approaches.',
      crypto: 'Focus on cryptographic analysis: identify cipher type, attempt decryption, explain the algorithm.',
      forensics: 'Analyze for hidden data: steganography hints, file signatures, metadata analysis, strings extraction.',
      web: 'Analyze for web vulnerabilities: XSS, SQL injection, CSRF, cookie manipulation, path traversal.',
      general: 'Apply general CTF skills: encoding detection, command-line tools, file analysis, basic scripting.',
      reverse: 'Analyze for reverse engineering clues: assembly hints, obfuscated code, decompilation approach.',
    };

    return `You are an expert CTF (Capture The Flag) challenge solver assisting a computer science student in a cybersecurity course.

Category focus: ${catInstructions[category] || catInstructions.auto}

Challenge input:
\`\`\`
${challengeText}
\`\`\`

Provide a structured analysis:

1. **IDENTIFICATION**: What type of encoding/cipher/vulnerability is this? What are the telltale signs?

2. **APPROACH**: Step-by-step methodology to solve this.

3. **SOLUTION**: Attempt to decode/solve directly if possible. Show your work.

4. **FLAG**: If you find or can derive the flag, present it clearly as: picoCTF{...}

5. **TOOLS**: What command-line tools or Python code would solve this? Give a short working example.

6. **LEARNING**: What cybersecurity concept does this challenge teach?

Be concise but complete. If you cannot fully solve it, explain exactly what the solver would need to do next.`;
  }

  async function solve() {
    const challengeText = input.value.trim();
    if (!challengeText || challengeText === '[Image file loaded — will be sent to AI for visual analysis]' && !uploadedFileData) {
      alert('Paste a challenge or upload a file first.');
      return;
    }

    const btn = document.getElementById('solveBtn');
    const panel = document.getElementById('outputPanel');
    const body = document.getElementById('outputBody');

    btn.disabled = true;
    btn.querySelector('.btn-inner').innerHTML = '<span class="spinner"></span><span>ANALYZING...</span>';
    panel.classList.add('visible');
    body.textContent = 'Querying AI solver...';

    try {
      let messages;

      if (uploadedFileType === 'image' && uploadedFileData) {
        const imgType = uploadedFile.type || 'image/png';
        messages = [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: imgType, data: uploadedFileData } },
            { type: 'text', text: buildPrompt(`[Image file: ${uploadedFile.name}]\nAnalyze this image for CTF clues: hidden text, steganography, LSB encoding, metadata hints, QR codes, barcodes, or anything that could contain or hint at a flag.`, selectedCat) }
          ]
        }];
      } else {
        messages = [{ role: 'user', content: buildPrompt(challengeText, selectedCat) }];
      }

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': 'sk-ant-api03-ADDYOURKEYHERE', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages
        })
      });

      const data = await response.json();
      if (!response.ok) {
        const errMsg = data?.error?.message || JSON.stringify(data);
        body.innerHTML = `<span class="error-msg">API Error ${response.status}: ${escHtml2(errMsg)}</span>`;
        btn.disabled = false;
        btn.querySelector('.btn-inner').innerHTML = '<span>ANALYZE &amp; SOLVE</span>';
        return;
      }
      const text = data.content?.map(b => b.text || '').join('') || 'No response received.';

      body.innerHTML = formatOutput(text);

      const detected = detectType(challengeText);
      const flagMatch = text.match(/picoCTF\{[^}]+\}/);
      addHistory(uploadedFileType === 'image' ? 'IMAGE' : detected[0], (uploadedFile ? uploadedFile.name : challengeText.slice(0, 40)) + '...', flagMatch ? flagMatch[0] : null);

    } catch (err) {
      body.innerHTML = `<span class="error-msg">Error: ${err.message}\n\nMake sure you're running this through the CTF-AI interface with API access.</span>`;
    }

    btn.disabled = false;
    btn.querySelector('.btn-inner').innerHTML = '<span>ANALYZE &amp; SOLVE</span>';
  }

  function formatOutput(text) {
    // highlight flags
    let formatted = text.replace(/picoCTF\{[^}]+\}/g, match =>
      `<span class="flag-highlight">${match}</span>`
    );
    // bold headers
    formatted = formatted.replace(/\*\*([^*]+)\*\*/g, '<strong style="color:var(--cyan)">$1</strong>');
    // code blocks
    formatted = formatted.replace(/`([^`]+)`/g, '<code style="color:var(--green);background:rgba(0,255,136,0.07);padding:1px 5px;border-radius:2px;">$1</code>');
    return formatted;
  }

  function addHistory(type, inputPreview, flag) {
    history.unshift({ type, inputPreview, flag });
    if (history.length > 8) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const section = document.getElementById('historySection');
    const list = document.getElementById('historyList');
    section.style.display = 'block';
    list.innerHTML = history.map((h, i) => `
      <div class="history-item" onclick="loadHistory(${i})">
        <span class="hist-type">${h.type}</span>
        <span class="hist-input">${h.inputPreview}</span>
        ${h.flag ? `<span class="hist-flag">FLAG FOUND</span>` : '<span style="color:var(--text-dim);font-size:10px;margin-left:auto;">no flag</span>'}
      </div>
    `).join('');
  }

  function loadHistory(i) {
    // just a UI hook for replay — could expand
  }

  function copyOutput() {
    const text = document.getElementById('outputBody').innerText;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'COPIED!';
      setTimeout(() => btn.textContent = 'COPY', 1500);
    });
  }
</script>
</body>
</html>
